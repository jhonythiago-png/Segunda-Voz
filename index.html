<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    
    <title>Segunda Voz</title>
    
    <meta name="apple-mobile-web-app-title" content="Segunda Voz">
    <meta name="application-name" content="Segunda Voz">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a0a1a">
    <meta name="background-color" content="#0a0a1a">
    
    <link rel="icon" type="image/png" sizes="512x512" href="logo.png">
    <link rel="apple-touch-icon" sizes="512x512" href="logo.png">
    <link rel="apple-touch-icon-precomposed" sizes="512x512" href="logo.png">
    
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: system-ui, 'Segoe UI', sans-serif;
            background: #0a0a1a;
            margin: 0;
            padding: 0;
            padding-top: max(16px, env(safe-area-inset-top));
            padding-bottom: max(16px, env(safe-area-inset-bottom));
            padding-left: max(12px, env(safe-area-inset-left));
            padding-right: max(12px, env(safe-area-inset-right));
            color: #ededee;
            min-height: 100vh;
        }
        
        /* 🔥 MODO PALCO: impede tela de desligar */
        body.palco-ativo {
            background: #0a0a1a;
        }
        
        .container {
            max-width: 550px;
            margin: 0 auto;
            width: 100%;
        }
        
        h1 {
            font-size: 1.4rem;
            text-align: center;
            margin: 0 0 4px;
            padding-top: 4px;
            background: linear-gradient(135deg, #f97316, #ec489a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .subtitulo {
            text-align: center;
            color: #8b8ca8;
            font-size: 0.65rem;
            margin-bottom: 12px;
        }
        
        .card {
            background: #131425;
            border-radius: 28px;
            padding: 14px 14px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
        
        /* 🔥 NOVO: Seletor de modo (Normal / Palco) */
        .modo-apresentacao {
            background: #1a1b2f;
            border-radius: 60px;
            padding: 6px;
            margin-bottom: 14px;
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: center;
        }
        
        .btn-modo-apresentacao {
            flex: 1;
            background: #1e1f32;
            border: none;
            color: #b9c0d4;
            padding: 8px 0;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.1s;
        }
        
        .btn-modo-apresentacao.ativo {
            background: #f97316;
            color: #0a0a1a;
            box-shadow: 0 0 6px #f97316;
        }
        
        .seletor-nota {
            background: #1e1f32;
            border-radius: 60px;
            padding: 5px;
            margin-bottom: 14px;
            display: flex;
            gap: 8px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        select {
            background: #0a0a1a;
            color: #f97316;
            border: none;
            padding: 10px 12px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            font-family: monospace;
            flex: 2;
            min-width: 100px;
        }
        
        .botoes-acidente {
            display: flex;
            gap: 6px;
            flex: 1;
        }
        
        .btn-acidente {
            background: #2d2e44;
            border: none;
            color: #facc15;
            padding: 10px 0;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            flex: 1;
            transition: 0.1s;
        }
        
        .btn-acidente:active {
            transform: scale(0.96);
        }
        
        .nota-atual-display {
            text-align: center;
            margin-bottom: 14px;
        }
        
        .nota-atual-box {
            background: #0a0a1a;
            display: inline-block;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: 800;
            font-family: monospace;
            letter-spacing: 2px;
            color: #f97316;
            border: 1px solid #f97316;
            cursor: pointer;
        }
        
        .modo-botoes {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
        }
        
        .btn-modo {
            flex: 1;
            background: #1e1f32;
            border: none;
            color: white;
            padding: 10px 0;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.1s;
        }
        
        .btn-modo.ativo {
            background: #f97316;
            color: #0a0a1a;
            box-shadow: 0 0 6px #f97316;
        }
        
        .controles-painel {
            margin-bottom: 14px;
        }
        
        .controle-item {
            background: #1a1b2f;
            border-radius: 50px;
            padding: 8px 14px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .controle-item label {
            font-size: 0.75rem;
            font-weight: bold;
            color: #facc15;
            min-width: 60px;
        }
        
        .controle-item span {
            background: #0a0a1a;
            padding: 3px 8px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: bold;
            min-width: 45px;
            text-align: center;
        }
        
        input[type="range"] {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            background: #2d2e44;
            border-radius: 10px;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #f97316;
            border-radius: 50%;
            cursor: pointer;
        }
        
        .nota-item {
            background: #1a1b2f;
            border-radius: 20px;
            margin-bottom: 12px;
            padding: 12px 14px;
            border-left: 3px solid #f97316;
        }
        
        .nota-nome {
            font-size: 1.3rem;
            font-weight: 800;
            display: flex;
            align-items: baseline;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 4px;
        }
        
        .intervalo {
            font-size: 0.65rem;
            background: #2a2c44;
            padding: 2px 8px;
            border-radius: 30px;
            color: #facc15;
        }
        
        .descricao {
            font-size: 0.65rem;
            color: #9ca3af;
            margin-bottom: 10px;
        }
        
        button.tocar {
            background: #f97316;
            border: none;
            color: #0a0a1a;
            font-weight: bold;
            padding: 8px;
            border-radius: 50px;
            width: 100%;
            cursor: pointer;
            transition: 0.05s linear;
            font-size: 0.8rem;
        }
        
        button.tocar:active {
            transform: scale(0.97);
            background: #fdba74;
        }
        
        button.parar-global {
            background: #1e1f32;
            border: 1px solid #ec489a;
            color: #facc15;
            padding: 10px;
            border-radius: 50px;
            width: 100%;
            font-weight: bold;
            margin-top: 12px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        
        .status {
            text-align: center;
            font-size: 0.6rem;
            color: #8b8ca8;
            margin-top: 12px;
            background: #0e0f1c;
            padding: 6px;
            border-radius: 50px;
        }
        
        footer {
            text-align: center;
            font-size: 0.6rem;
            color: #52547a;
            margin-top: 12px;
            padding-top: 8px;
            border-top: 1px solid #1e1f32;
        }
        
        .credito {
            color: #f97316;
            font-weight: bold;
        }
        
        apple-touch-icon {
            border-radius: 0 !important;
            background: transparent !important;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🎤 SEGUNDA VOZ</h1>
    <div class="subtitulo">SUA HARMONIA EM 3 NOTAS</div>

    <div class="card">
        <!-- 🔥 NOVO: Seletor de Modo (Normal / Palco) -->
        <div class="modo-apresentacao">
            <button id="btnModoNormal" class="btn-modo-apresentacao ativo">📱 Normal</button>
            <button id="btnModoPalco" class="btn-modo-apresentacao">🎤 Modo Palco</button>
        </div>
        
        <div class="seletor-nota">
            <select id="notaBaseSelect">
                <option value="C">Dó</option>
                <option value="D">Ré</option>
                <option value="E">Mi</option>
                <option value="F" selected>Fá</option>
                <option value="G">Sol</option>
                <option value="A">Lá</option>
                <option value="B">Si</option>
            </select>
            <div class="botoes-acidente">
                <button id="btnSustenido" class="btn-acidente">#</button>
                <button id="btnBemol" class="btn-acidente">b</button>
            </div>
        </div>

        <div class="nota-atual-display">
            <div class="nota-atual-box" id="notaAtualDisplay">Fá</div>
        </div>

        <div class="modo-botoes">
            <button id="btnMaior" class="btn-modo ativo">MAIOR</button>
            <button id="btnMenor" class="btn-modo">MENOR</button>
        </div>

        <div class="controles-painel">
            <div class="controle-item">
                <label>🔊 Vol</label>
                <input type="range" id="volumeSlider" min="0" max="100" value="35">
                <span id="volumePercent">35%</span>
            </div>
            <div class="controle-item">
                <label>⏺ Fade</label>
                <input type="range" id="fadeSlider" min="0.1" max="1.5" step="0.01" value="0.6">
                <span id="fadeValue">0.6s</span>
            </div>
        </div>

        <div id="notasContainer"></div>

        <button id="pararTudoBtn" class="parar-global">🔇 PARAR</button>
        <div class="status" id="statusMsg">🎧 Ajuste o Fade para o som ficar perfeito</div>
    </div>

    <footer>
        Desenvolvido por <span class="credito">Jhony Beraldo</span>
    </footer>
</div>

<script>
    const notaParaIndice = {
        'C': 0, 'D': 2, 'E': 4, 'F': 5, 'G': 7, 'A': 9, 'B': 11
    };
    
    const escalaCromatica = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
    
    const nomesDisplay = {
        'C': 'Dó', 'C#': 'Dó#', 'D': 'Ré', 'D#': 'Ré#', 'E': 'Mi',
        'F': 'Fá', 'F#': 'Fá#', 'G': 'Sol', 'G#': 'Sol#', 'A': 'Lá',
        'A#': 'Lá#', 'B': 'Si', 'Db': 'Ré♭', 'Eb': 'Mi♭', 'Gb': 'Sol♭', 'Ab': 'Lá♭', 'Bb': 'Si♭'
    };
    
    const tonsMaiores = {
        'C': { quinta: 'G', terça: 'E', setima: 'B' }, 'C#': { quinta: 'G#', terça: 'F', setima: 'C' },
        'D': { quinta: 'A', terça: 'F#', setima: 'C#' }, 'D#': { quinta: 'A#', terça: 'G', setima: 'D' },
        'E': { quinta: 'B', terça: 'G#', setima: 'D#' }, 'F': { quinta: 'C', terça: 'A', setima: 'E' },
        'F#': { quinta: 'C#', terça: 'A#', setima: 'F' }, 'G': { quinta: 'D', terça: 'B', setima: 'F#' },
        'G#': { quinta: 'D#', terça: 'C', setima: 'G' }, 'A': { quinta: 'E', terça: 'C#', setima: 'G#' },
        'A#': { quinta: 'F', terça: 'D', setima: 'A' }, 'B': { quinta: 'F#', terça: 'D#', setima: 'A#' }
    };
    
    const tonsMenores = {
        'C': { quinta: 'G', terça: 'Eb', setima: 'Bb' }, 'C#': { quinta: 'G#', terça: 'E', setima: 'B' },
        'D': { quinta: 'A', terça: 'F', setima: 'C' }, 'D#': { quinta: 'A#', terça: 'F#', setima: 'C#' },
        'E': { quinta: 'B', terça: 'G', setima: 'D' }, 'F': { quinta: 'C', terça: 'Ab', setima: 'Eb' },
        'F#': { quinta: 'C#', terça: 'A', setima: 'E' }, 'G': { quinta: 'D', terça: 'Bb', setima: 'F' },
        'G#': { quinta: 'D#', terça: 'B', setima: 'F#' }, 'A': { quinta: 'E', terça: 'C', setima: 'G' },
        'A#': { quinta: 'F', terça: 'C#', setima: 'G#' }, 'B': { quinta: 'F#', terça: 'D', setima: 'A' }
    };
    
    const freqBase = {
        'C': 261.63, 'C#': 277.18, 'Db': 277.18, 'D': 293.66, 'D#': 311.13, 'Eb': 311.13,
        'E': 329.63, 'F': 349.23, 'F#': 369.99, 'Gb': 369.99, 'G': 392.00, 'G#': 415.30,
        'Ab': 415.30, 'A': 440.00, 'A#': 466.16, 'Bb': 466.16, 'B': 493.88
    };
    
    let notaNatural = 'F';
    let acidente = 0;
    let notaReal = 'F';
    let modoAtual = 'maior';
    
    let audioCtx = null;
    let oscAtual = null;
    let gainAtual = null;
    let volumeAtual = 0.35;
    let fadeTime = 0.6;
    
    // 🔥 Controle do Modo Palco
    let wakeLock = null;
    let modoPalcoAtivo = false;
    
    // 🔥 Função para manter tela ligada (Modo Palco)
    async function ativarWakeLock() {
        if ('wakeLock' in navigator && !wakeLock) {
            try {
                wakeLock = await navigator.wakeLock.request('screen');
                document.getElementById('statusMsg').innerHTML = '🎤 Modo Palco ativo · Tela sempre ligada';
                return true;
            } catch (err) {
                document.getElementById('statusMsg').innerHTML = '⚠️ Modo Palco não suportado neste dispositivo';
                return false;
            }
        } else {
            document.getElementById('statusMsg').innerHTML = '⚠️ Seu navegador não suporta tela sempre ligada';
            return false;
        }
    }
    
    function desativarWakeLock() {
        if (wakeLock) {
            wakeLock.release();
            wakeLock = null;
            document.getElementById('statusMsg').innerHTML = `📱 Modo Normal · fade ${fadeTime.toFixed(1)}s`;
        }
    }
    
    // Alterna entre Modo Normal e Modo Palco
    function setModoPalco(ativar) {
        modoPalcoAtivo = ativar;
        if (ativar) {
            ativarWakeLock();
            // Reativa áudio se estiver suspenso
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        } else {
            desativarWakeLock();
        }
    }
    
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended' && modoPalcoAtivo) {
            audioCtx.resume();
        } else if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
        return audioCtx;
    }
    
    function setVolume(v) {
        volumeAtual = Math.min(1, Math.max(0, v / 100));
        document.getElementById('volumePercent').innerText = Math.round(v) + '%';
        if (gainAtual && audioCtx) gainAtual.gain.linearRampToValueAtTime(volumeAtual, audioCtx.currentTime + fadeTime);
    }
    
    function setFadeTime(v) {
        fadeTime = parseFloat(v);
        document.getElementById('fadeValue').innerText = fadeTime.toFixed(1) + 's';
        document.getElementById('statusMsg').innerHTML = `⏺ Fade: ${fadeTime.toFixed(1)}s`;
    }
    
    function pararTudo() {
        if (oscAtual && gainAtual && audioCtx) {
            gainAtual.gain.linearRampToValueAtTime(0, audioCtx.currentTime + fadeTime);
            setTimeout(() => {
                try { if (oscAtual) oscAtual.stop(); oscAtual.disconnect(); } catch(e) {}
                oscAtual = null; gainAtual = null;
            }, (fadeTime * 1000) + 50);
        } else if (oscAtual) {
            try { oscAtual.stop(); } catch(e) {}
            oscAtual = null;
        }
        if (!modoPalcoAtivo) {
            document.getElementById('statusMsg').innerHTML = `🔇 Parado · Fade ${fadeTime.toFixed(1)}s`;
        }
    }
    
    function tocarNotaConstante(notaNome, freqOriginal) {
        const ctx = initAudio();
        if (oscAtual && gainAtual) {
            gainAtual.gain.linearRampToValueAtTime(0, ctx.currentTime + fadeTime);
            setTimeout(() => {
                try { if (oscAtual) oscAtual.stop(); oscAtual.disconnect(); } catch(e) {}
                oscAtual = null; gainAtual = null;
                tocarNovo(notaNome, freqOriginal);
            }, (fadeTime * 1000) + 30);
        } else {
            tocarNovo(notaNome, freqOriginal);
        }
    }
    
    function tocarNovo(notaNome, freqOriginal) {
        const ctx = audioCtx;
        if (!ctx) return;
        try {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'triangle';
            osc.frequency.value = freqOriginal;
            gain.gain.value = 0;
            gain.gain.linearRampToValueAtTime(volumeAtual, ctx.currentTime + fadeTime);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            oscAtual = osc;
            gainAtual = gain;
            if (!modoPalcoAtivo) {
                document.getElementById('statusMsg').innerHTML = `🎵 ${notaNome} · ${freqOriginal.toFixed(0)}Hz · fade ${fadeTime.toFixed(1)}s`;
            }
            osc.onended = () => { if (oscAtual === osc) { oscAtual = null; gainAtual = null; } };
        } catch(e) { document.getElementById('statusMsg').innerHTML = '⚠️ Toque novamente'; }
    }
    
    function atualizarNotaReal() {
        let indiceBase = notaParaIndice[notaNatural];
        let novoIndice = (indiceBase + acidente + 12) % 12;
        notaReal = escalaCromatica[novoIndice];
        document.getElementById('notaAtualDisplay').innerText = nomesDisplay[notaReal] || notaReal;
    }
    
    function setNotaNatural(nota) { notaNatural = nota; atualizarNotaReal(); atualizarTudo(); }
    function aplicarAcidente(tipo) {
        if (tipo === 'sustenido') { if (acidente === 1) return; acidente = 1; }
        else if (tipo === 'bemol') { if (acidente === -1) return; acidente = -1; }
        atualizarNotaReal(); atualizarTudo();
    }
    function resetAcidente() { acidente = 0; atualizarNotaReal(); atualizarTudo(); }
    function setModo(modo) { modoAtual = modo; atualizarTudo(); }
    
    function atualizarTudo() {
        if (modoAtual === 'maior') {
            document.getElementById('btnMaior').classList.add('ativo');
            document.getElementById('btnMenor').classList.remove('ativo');
        } else {
            document.getElementById('btnMenor').classList.add('ativo');
            document.getElementById('btnMaior').classList.remove('ativo');
        }
        pararTudo();
        renderizarNotas();
    }
    
    function obterNotasPorTom() {
        const harmonias = modoAtual === 'maior' ? tonsMaiores[notaReal] : tonsMenores[notaReal];
        if (!harmonias) return [];
        const tipoTerca = modoAtual === 'menor' ? 'Terça menor' : 'Terça maior';
        const descTerca = modoAtual === 'menor' ? 'Profundidade' : 'Emocional';
        return [
            { notaRaw: harmonias.quinta, tipo: 'Quinta', descricao: 'Estável · combina com tudo' },
            { notaRaw: harmonias.terça, tipo: tipoTerca, descricao: descTerca },
            { notaRaw: harmonias.setima, tipo: 'Sétima', descricao: 'Jazz · sofisticação' }
        ];
    }
    
    function renderizarNotas() {
        const container = document.getElementById('notasContainer');
        container.innerHTML = '';
        const notas = obterNotasPorTom();
        notas.forEach(op => {
            if (!op.notaRaw) return;
            let notaExibida = nomesDisplay[op.notaRaw] || op.notaRaw;
            let freq = freqBase[op.notaRaw];
            if (!freq) return;
            const div = document.createElement('div');
            div.className = 'nota-item';
            div.innerHTML = `<div class="nota-nome">${notaExibida} <span class="intervalo">${op.tipo}</span></div><div class="descricao">${op.descricao}</div><button class="tocar" data-nota="${notaExibida}" data-freq="${freq}">▶ Tocar · ${notaExibida}</button>`;
            container.appendChild(div);
        });
        document.querySelectorAll('.tocar').forEach(btn => {
            const nota = btn.dataset.nota;
            const freq = parseFloat(btn.dataset.freq);
            const handler = () => tocarNotaConstante(nota, freq);
            btn.removeEventListener('click', btn._listener);
            btn.addEventListener('click', handler);
            btn._listener = handler;
        });
    }
    
    // Reativa áudio ao voltar para o app
    function reativarAudioAoTornarVisivel() {
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) {
                if (modoPalcoAtivo) {
                    if (audioCtx && audioCtx.state === 'suspended') {
                        audioCtx.resume();
                    }
                    ativarWakeLock();
                } else if (audioCtx && audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            }
        });
    }
    
    // ========== EVENTOS ==========
    document.getElementById('btnModoNormal').addEventListener('click', () => {
        document.getElementById('btnModoNormal').classList.add('ativo');
        document.getElementById('btnModoPalco').classList.remove('ativo');
        setModoPalco(false);
    });
    
    document.getElementById('btnModoPalco').addEventListener('click', () => {
        document.getElementById('btnModoPalco').classList.add('ativo');
        document.getElementById('btnModoNormal').classList.remove('ativo');
        setModoPalco(true);
    });
    
    document.getElementById('notaBaseSelect').addEventListener('change', (e) => setNotaNatural(e.target.value));
    document.getElementById('btnSustenido').addEventListener('click', () => aplicarAcidente('sustenido'));
    document.getElementById('btnBemol').addEventListener('click', () => aplicarAcidente('bemol'));
    document.getElementById('notaAtualDisplay').addEventListener('click', resetAcidente);
    document.getElementById('btnMaior').addEventListener('click', () => setModo('maior'));
    document.getElementById('btnMenor').addEventListener('click', () => setModo('menor'));
    document.getElementById('pararTudoBtn').addEventListener('click', pararTudo);
    document.getElementById('volumeSlider').addEventListener('input', (e) => setVolume(parseInt(e.target.value)));
    document.getElementById('fadeSlider').addEventListener('input', (e) => setFadeTime(e.target.value));
    
    atualizarNotaReal();
    atualizarTudo();
    setVolume(35);
    setFadeTime(0.6);
    reativarAudioAoTornarVisivel();
    
    function ativarAudio() {
        if (audioCtx && audioCtx.state === 'suspended') {
            audioCtx.resume();
        } else if (!audioCtx) {
            initAudio();
        }
    }
    document.body.addEventListener('touchstart', ativarAudio, { once: true });
    document.body.addEventListener('click', ativarAudio, { once: true });
</script>
</body>
</html>
